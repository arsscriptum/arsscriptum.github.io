# Site settings
title: Ars Scriptum # site title
description: The Art of Code # site description
  I'm writing in about my different development projects, my learning experiences and general matter
  worth sharing with the world. <a href="https://github.com/piharpi" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: Canada/Montreal # set your timezone
image: assets/img/avatar-r.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/arsscriptum/arsscriptum.github.io # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author: 
  name: Guillaume Plante
  bio: >- # tell to the world
    The A French-Canadian developper with a passion for technology, music, astronomy and art. Coding range: hardware/drivers, security, ai,. c/c++, powershell.
  username:  # general username
  github: arsscriptum # github username
  twitter:  # twitter username
  facebook:  # facebook username
  email: guillaumeplante.qc@gmail.com # email adress
  avatar: /assets/img/avatar-r.jpg # change with your own avatar

# URL settings
url: "https://tiny.one/arsscriptum" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
